[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = [".venv", "venv", "output", "agents/tests/fixtures"]

[tool.ruff.lint]
# pycodestyle errors/warnings, pyflakes, isort, pyupgrade, bugbear.
select = ["E", "F", "W", "I", "UP", "B"]

[tool.pytest.ini_options]
testpaths = ["agents", "radar", "learnx", "delivery", "dashboard"]
