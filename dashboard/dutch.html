<!doctype html>
<!-- Delft trainer (v9 day 32) — static, client-side only. Fetches dutch_lesson.json
     (committed by the daily run, copied here by pages.yml) and mirrors the Delftse
     methode app's structure:
       LEREN  steps 1-5 — sentence-by-sentence with translations; whole text with
              transcript; listen-and-repeat without text (Block B's built-in pauses);
              whole text without transcript. Real player: prev / play-pause / next /
              slider over the lesson MP3's timestamped segments. Step 5 is a Dictee ->
              Combineren -> Dictee drill over the day's new words (hear-and-type,
              match, re-type) — within-session repetition that feeds the same SRS.
       TEST   gatentekst (whole text, new words blanked, checked) and luistertoets
              (hear each sentence ONCE — enforced — then fill its target words).
       LESSEN per-day scores plus the lesson archive (lessons/index.json): tap ▶ on
              a past day to reopen that whole lesson — a finished lesson stays
              visitable. Archived days play audio from the release CDN.
       HERHALING (multi-user Phase 1) — appears only when opened with ?u=<token>:
              fetches review/<token>.json (this learner's words due across ALL past
              days), drills each from memory with cross-day audio, and reports via a
              t.me/<bot>?start=rv_ deep link. The published JSON is canonical;
              localStorage caches attempts.
     Progress lives in localStorage — no backend, no accounts, no PII. -->
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dutch trainer — LearnX-Radar</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  /* LearnX-Radar's own playful look: candy colors, rounded cards, chunky 3D
     buttons (flat face + darker bottom edge that "presses" on click). Inspired by
     the general gamified-learning aesthetic — layout, copy and palette are ours. */
  :root {
    --green:#5fbf38; --green-edge:#48992a; --green-soft:#e8f7e0;
    --blue:#2bb3f0;  --blue-edge:#1f93c7;  --blue-soft:#e3f5fd;
    --orange:#ff9d33; --orange-edge:#e07f17;
    --red:#ff5757; --red-soft:#ffe9e9;
    --ink:#3d4350; --grey:#8a909c; --border:#e6e8ec; --bg:#f7f8f5; --card:#fff;
  }
  * { box-sizing:border-box; }
  body { font-family:"Nunito","Segoe UI",-apple-system,Roboto,sans-serif; background:var(--bg);
         max-width:760px; margin:0 auto 4rem; padding:0 1rem; color:var(--ink); line-height:1.55; }
  header.bar { display:flex; align-items:center; gap:.7rem; padding:1.1rem 0 .6rem; }
  header.bar .owl { font-size:1.9rem; }
  header.bar h1 { font-size:1.25rem; margin:0; font-weight:800; }
  header.bar .meta { color:var(--grey); font-size:.85rem; font-weight:700;
                     background:var(--card); border:2px solid var(--border);
                     border-radius:999px; padding:.15rem .7rem; }
  header.bar a { margin-left:auto; color:var(--blue); text-decoration:none; font-weight:800;
                 font-size:.9rem; }
  .tabs { display:flex; gap:.5rem; margin:.6rem 0 1rem; }
  .tabs button { flex:1; background:var(--card); color:var(--grey); font:inherit;
                 font-weight:800; text-transform:uppercase; letter-spacing:.05em;
                 font-size:.82rem; padding:.55rem; cursor:pointer;
                 border:2px solid var(--border); border-bottom-width:4px; border-radius:14px; }
  .tabs button:active { transform:translateY(2px); border-bottom-width:2px; }
  .tabs button.active { background:var(--green-soft); color:var(--green-edge);
                        border-color:var(--green); }
  .pills { display:flex; gap:.5rem; flex-wrap:wrap; margin:.2rem 0 1rem; }
  .pills button { min-width:2.7rem; height:2.7rem; padding:0 1rem; border-radius:999px;
                  font:inherit; font-weight:800; color:var(--grey); background:var(--card);
                  cursor:pointer; white-space:nowrap;
                  border:2px solid var(--border); border-bottom-width:4px; }
  .pills button:active { transform:translateY(2px); border-bottom-width:2px; }
  .pills button.active { background:var(--green); border-color:var(--green-edge);
                         color:#fff; }
  .hint { background:var(--card); border:2px solid var(--border); border-radius:16px;
          padding:.7rem 1rem; color:var(--ink); font-weight:700; font-size:.92rem; }
  .player { background:var(--card); border:2px solid var(--border); border-radius:20px;
            padding:1.3rem 1.2rem 1rem; display:flex; flex-direction:column;
            align-items:center; gap:1rem; margin:1.1rem 0; }
  .player .buttons { display:flex; gap:.6rem; }
  .player .buttons button { width:3.4rem; height:3.4rem; font-size:1.35rem; color:#fff;
            background:var(--blue); border:0; border-bottom:4px solid var(--blue-edge);
            border-radius:18px; cursor:pointer; }
  .player .buttons button:active { transform:translateY(2px); border-bottom-width:2px; }
  .player .buttons button:nth-child(2) { background:var(--green);
            border-bottom-color:var(--green-edge); width:4.2rem; }
  .player .buttons button.toggled { background:var(--orange);
            border-bottom-color:var(--orange-edge); }
  .player input[type=range] { width:100%; accent-color:var(--green); }
  .line { display:flex; align-items:center; gap:.7rem; background:var(--card);
          border:2px solid var(--border); border-radius:14px; padding:.5rem .7rem;
          margin:.45rem 0; }
  .line button.play, .les-row button.play { width:2.4rem; height:2.4rem; flex:none;
          font-size:1rem; color:#fff;
          background:var(--blue); border:0; border-bottom:4px solid var(--blue-edge);
          border-radius:12px; cursor:pointer; }
  .line button.play:active, .les-row button.play:active { transform:translateY(2px);
          border-bottom-width:2px; }
  .line button.play:disabled { background:#cfd4dc; border-bottom-color:#b9bfc9;
          cursor:not-allowed; }
  .line .nl { font-weight:800; }
  .line .en { color:var(--grey); font-style:italic; font-size:.92rem; }
  .line .en.veiled { background:var(--blue-soft); color:var(--blue-soft);
          border-radius:8px; cursor:pointer; padding:0 .3rem; }
  .line .en.veiled:hover { background:#d2eefb; color:#d2eefb; }
  .line.now { border-color:var(--green); background:var(--green-soft); }
  .transcript .line { border-style:dashed; }
  .peek-box { min-height:1.9rem; font-weight:800; text-align:center; }
  .cloze-line { background:var(--card); border:2px solid var(--border); border-radius:14px;
                padding:.55rem .8rem; margin:.45rem 0; }
  .cloze-line input { font:inherit; font-weight:700; width:8.5rem; padding:.15rem .5rem;
                      border:2px solid var(--border); border-radius:10px; background:#fff; }
  .cloze-line input:focus { outline:none; border-color:var(--blue); }
  .cloze-line input.right { border-color:var(--green); background:var(--green-soft);
                            color:var(--green-edge); }
  .cloze-line input.wrong { border-color:var(--red); background:var(--red-soft);
                            color:var(--red); }
  button.score { background:var(--green); color:#fff; border:0;
                 border-bottom:4px solid var(--green-edge); border-radius:14px;
                 padding:.6rem 1.6rem; font:inherit; font-weight:800;
                 text-transform:uppercase; letter-spacing:.05em; cursor:pointer; }
  button.score:active:not(:disabled) { transform:translateY(2px); border-bottom-width:2px; }
  button.score:disabled { background:#cfd4dc; border-bottom-color:#b9bfc9;
                          cursor:not-allowed; }
  button.score.retake { background:var(--blue); border-bottom-color:var(--blue-edge);
                        margin-left:.6rem; }
  a.score { display:inline-block; background:var(--green); color:#fff; text-decoration:none;
            border-bottom:4px solid var(--green-edge); border-radius:14px;
            padding:.6rem 1.6rem; font-weight:800; font-size:.9rem;
            text-transform:uppercase; letter-spacing:.05em; }
  a.score:active { transform:translateY(2px); border-bottom-width:2px; }
  .report-note { color:var(--grey); font-weight:700; font-size:.85rem; margin-left:.7rem; }
  .attempts { color:var(--grey); font-weight:800; font-size:.85rem; margin-left:.8rem; }
  .result { color:var(--green-edge); font-weight:800; margin-left:.8rem; }
  .stats { color:var(--grey); font-weight:700; margin-top:1rem; }
  .stats strong { color:var(--ink); }
  .muted { color:var(--grey); }
  .lt-row { display:flex; align-items:center; flex-wrap:wrap; gap:.4rem;
            background:var(--card); border:2px solid var(--border); border-radius:14px;
            padding:.55rem .7rem; margin:.45rem 0; }
  .lt-row .speaker { color:var(--grey); font-weight:800; font-size:.85rem; }
  .lt-row button.play { width:2.4rem; height:2.4rem; flex:none; font-size:1rem; color:#fff;
          background:var(--blue); border:0; border-bottom:4px solid var(--blue-edge);
          border-radius:12px; cursor:pointer; }
  .lt-row button.play:active { transform:translateY(2px); border-bottom-width:2px; }
  .lt-row button.play:disabled { background:#cfd4dc; border-bottom-color:#b9bfc9;
          cursor:not-allowed; }
  .lt-row .cloze-line { border:0; padding:0; margin:0; background:none; }
  .les-row { display:flex; align-items:center; gap:.6rem; background:var(--card);
             border:2px solid var(--border); border-radius:14px; padding:.6rem .9rem;
             margin:.45rem 0; }
  .les-row .les { color:var(--blue); font-weight:800; flex:none;
                  min-width:5.4rem; white-space:nowrap; }
  .les-row .title { font-weight:700; color:var(--grey); flex:1 1 auto; min-width:0;
                    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  /* result cluster: attempts + pct + check stay together, pinned right, never shrink
     so the check can't be pushed off the edge on narrow phones */
  .les-row .meta { margin-left:auto; flex:none; display:flex; align-items:center;
                   gap:.5rem; }
  .les-row .meta .attempts { margin-left:0; }
  .les-row .pct { color:var(--green-edge); font-weight:800; }
  .les-row .check { background:var(--green); color:#fff; border-radius:50%; flex:none;
                    width:1.5rem; height:1.5rem; display:flex; align-items:center;
                    justify-content:center; font-size:.8rem; }
  .les-row.open { border-color:var(--green); background:var(--green-soft); }
  /* Synced-status line in the LESSEN tab (words/streak/cefr from progress.json) */
  .synced { color:var(--grey); font-weight:700; font-size:.85rem; margin:.2rem 0 .6rem; }
  /* LEREN step 5: dictation rows reuse .line; inputs colour green/red like the cloze */
  .subhint { color:var(--grey); font-weight:800; font-size:.85rem; margin:.4rem 0; }
  .dictee .line input { font:inherit; font-weight:700; width:9rem; padding:.2rem .55rem;
                        border:2px solid var(--border); border-radius:10px; background:#fff; }
  .dictee .line input:focus { outline:none; border-color:var(--blue); }
  .dictee .line input.right { border-color:var(--green); background:var(--green-soft);
                              color:var(--green-edge); }
  .dictee .line input.wrong { border-color:var(--red); background:var(--red-soft);
                              color:var(--red); }
  /* COMBINEREN: two columns of tap-to-pair chips */
  .match-grid { display:flex; gap:.7rem; margin:.6rem 0; }
  .match-col { flex:1; display:flex; flex-direction:column; gap:.5rem; }
  .chip { font:inherit; font-weight:800; text-align:left; cursor:pointer; color:var(--ink);
          background:var(--card); border:2px solid var(--border); border-bottom-width:4px;
          border-radius:14px; padding:.6rem .8rem; }
  .chip:active { transform:translateY(2px); border-bottom-width:2px; }
  .chip.sel { border-color:var(--blue); background:var(--blue-soft); }
  .chip.miss { border-color:var(--red); background:var(--red-soft); }
  .chip.done { border-color:var(--green); background:var(--green-soft);
               color:var(--green-edge); cursor:default; }
</style></head><body>
<header class="bar">
  <span class="owl">📻</span>
  <h1>Dutch trainer</h1><span class="meta" id="meta">laden…</span>
  <a href="index.html">📡 radar</a>
</header>
<div class="tabs" id="tabs" style="display:none">
  <button data-tab="leren" class="active">🎧 leren</button>
  <button data-tab="test">✍️ test</button>
  <button data-tab="lessen">🏆 lessen</button>
  <button data-tab="herhaling" id="tab-herhaling" style="display:none">🔁 herhaling</button>
</div>
<div id="app"><p class="muted" style="margin-top:1rem">Loading today's lesson…</p></div>

<script>
(function () {
  "use strict";
  var app = document.getElementById("app");
  var audio = new Audio();
  audio.preload = "metadata";
  var stopAt = null;          // ms position where playback must stop
  var onTick = null;          // per-view position hook (slider/highlight)
  var onStop = null;          // called when stopAt is reached

  // A 40ms watchdog instead of `timeupdate` (which fires only ~4x/s — playback
  // would overshoot a sentence's end by up to ~250ms and bleed into the next line;
  // the inter-line gaps are only 150-450ms). The 20ms end margin absorbs the
  // remaining check latency so a snippet stops INSIDE its own trailing silence.
  setInterval(function () {
    if (audio.paused) return;
    var ms = audio.currentTime * 1000;
    if (onTick) onTick(ms);
    if (stopAt !== null && ms >= stopAt - 20) {
      audio.pause();
      stopAt = null;
      if (onStop) onStop();
    }
  }, 40);

  // Seek-then-play that is safe before the MP3's metadata has arrived (seeking an
  // unloaded <audio> silently no-ops and playback starts at 0 — the Block C bug).
  // The +10ms start nudge keeps a seek from landing one MP3 frame early and
  // catching the tail of the previous word.
  function playRange(startMs, endMs) {
    audio.pause();
    stopAt = endMs;
    var go = function () { audio.currentTime = (startMs + 10) / 1000; audio.play(); };
    if (audio.readyState >= 1) { go(); return; }
    audio.addEventListener("loadedmetadata", go, { once: true });
    audio.load();
  }

  function el(tag, cls, text) {
    var n = document.createElement(tag);
    if (cls) n.className = cls;
    if (text !== undefined) n.textContent = text;
    return n;
  }
  function norm(s) { return s.trim().toLowerCase().replace(/\s+/g, " "); }

  // --- localStorage: per-date results + one-chance flags ----------------------
  var STORE = "learnx-dutch-results";
  function loadResults() {
    try { return JSON.parse(localStorage.getItem(STORE)) || {}; }
    catch (e) { return {}; }
  }
  function saveResult(date, kind, right, wrong) {
    var all = loadResults();
    all[date] = all[date] || {};
    all[date][kind] = { right: right, wrong: wrong };
    localStorage.setItem(STORE, JSON.stringify(all));
    refreshStats();
  }
  function recallStats() {
    var right = 0, total = 0, all = loadResults();
    Object.keys(all).forEach(function (d) {
      Object.keys(all[d]).forEach(function (k) {
        right += (all[d][k].right || []).length;
        total += (all[d][k].right || []).length + (all[d][k].wrong || []).length;
      });
    });
    return { right: right, total: total };
  }
  var statsBox = null;
  function refreshStats() {
    if (!statsBox) return;
    statsBox.textContent = "";
    var s = recallStats();
    if (s.total) {
      var pct = Math.round(100 * s.right / s.total);
      statsBox.appendChild(el("span", null, "Recall op dit apparaat: "));
      statsBox.appendChild(el("strong", null, s.right + "/" + s.total + " (" + pct + "%)"));
    } else {
      statsBox.appendChild(el("span", "muted", "Nog geen resultaten."));
    }
    refreshReport();
  }

  // --- v9 day 33: send recall results back to the bot (deep link, no server) ----
  // One mark per word, in the payload's word order (the same order the daily run
  // stored in its own lesson record): 1 = right, 0 = wrong, x = not trained. A word
  // is wrong if ANY of its blanks was wrong in a scored attempt today; right needs
  // at least one right blank and no wrong one. Tapping the button opens
  // https://t.me/<bot>?start=dr_<YYMMDD>_<marks> — one tap in Telegram sends the
  // payload as a /start message from the learner's own account; the next morning's
  // run reads it via getUpdates and folds it into the spaced-repetition schedule.
  var reportLesson = null, reportBox = null;
  function wordMarks(lesson) {
    var kinds = loadResults()[lesson.date] || {};
    var rights = {}, wrongs = {};
    Object.keys(kinds).forEach(function (k) {
      (kinds[k].right || []).forEach(function (a) { rights[norm(a)] = true; });
      (kinds[k].wrong || []).forEach(function (a) { wrongs[norm(a)] = true; });
    });
    return (lesson.report.words || []).map(function (w) {
      var f = norm(w.form || "");
      if (wrongs[f]) return "0";
      if (rights[f]) return "1";
      return "x";
    }).join("");
  }
  function refreshReport() {
    if (!reportBox || !reportLesson) return;
    reportBox.textContent = "";
    var rep = reportLesson.report || {};
    if (!rep.bot || !(rep.words || []).length) return;
    var marks = wordMarks(reportLesson);
    if (!/[01]/.test(marks)) return;        // nothing scored yet today
    var a = el("a", "score", "✅ Resultaten opslaan");
    a.href = "https://t.me/" + rep.bot + "?start=dr_" +
             reportLesson.date.replace(/-/g, "").slice(2) + "_" + marks;
    reportBox.appendChild(a);
    reportBox.appendChild(el("span", "report-note",
      "stuurt je score naar de bot — morgen plant hij je woorden ernaar (sends your score to the bot)"));
  }

  // --- exam attempts: up to MAX_ATTEMPTS per date+exercise --------------------
  var MAX_ATTEMPTS = 3;
  var ATT = "learnx-dutch-attempts";
  function attemptsUsed(date, kind) {
    try {
      var all = JSON.parse(localStorage.getItem(ATT)) || {};
      return (all[date] || {})[kind] || 0;
    } catch (e) { return 0; }
  }
  function bumpAttempts(date, kind) {
    var all;
    try { all = JSON.parse(localStorage.getItem(ATT)) || {}; } catch (e) { all = {}; }
    all[date] = all[date] || {};
    all[date][kind] = Math.min(MAX_ATTEMPTS, (all[date][kind] || 0) + 1);
    localStorage.setItem(ATT, JSON.stringify(all));
    return all[date][kind];
  }

  // Score / retake controls shared by both exams: scoring closes the attempt
  // (inputs lock); "Opnieuw" opens the next one (form resets, fresh listens via
  // `onRetake`) until MAX_ATTEMPTS is reached.
  function examControls(lesson, kind, totalBlanks, inputs, answersByN, onRetake) {
    var bar = el("p");
    var used = attemptsUsed(lesson.date, kind);
    var score = el("button", "score", "Score");
    var retake = el("button", "score retake", "🔁 Opnieuw");
    var result = el("span", "result", "");
    var info = el("span", "attempts", "poging " + Math.min(used + 1, MAX_ATTEMPTS) +
                  "/" + MAX_ATTEMPTS);
    retake.style.display = "none";
    if (used >= MAX_ATTEMPTS) {
      score.disabled = true;
      inputs.forEach(function (i) { i.disabled = true; });
      info.textContent = "geen pogingen meer (no attempts left)";
    }
    score.addEventListener("click", function () {
      var r = checkInputs(inputs, answersByN);
      used = bumpAttempts(lesson.date, kind);
      result.textContent = r.right.length + "/" + totalBlanks + " goed";
      saveResult(lesson.date, kind, r.right, r.wrong);
      inputs.forEach(function (i) { i.disabled = true; });
      score.disabled = true;
      info.textContent = "poging " + used + "/" + MAX_ATTEMPTS + " gebruikt";
      if (used < MAX_ATTEMPTS && r.wrong.length) retake.style.display = "";
    });
    retake.addEventListener("click", function () {
      inputs.forEach(function (i) {
        i.disabled = false; i.value = ""; i.classList.remove("right", "wrong");
      });
      score.disabled = false;
      retake.style.display = "none";
      result.textContent = "";
      info.textContent = "poging " + Math.min(used + 1, MAX_ATTEMPTS) + "/" + MAX_ATTEMPTS;
      if (onRetake) onRetake();
    });
    bar.appendChild(score); bar.appendChild(retake);
    bar.appendChild(result); bar.appendChild(info);
    return bar;
  }

  // --- player widget: prev / play-pause / next / slider over a segment range ----
  function makePlayer(segments, opts) {
    opts = opts || {};
    var first = segments[0].start_ms, last = segments[segments.length - 1].end_ms;
    var box = el("div", "player");
    var buttons = el("div", "buttons");
    var prev = el("button", null, "⏮");
    var toggle = el("button", null, "▶");
    var next = el("button", null, "⏭");
    buttons.appendChild(prev); buttons.appendChild(toggle); buttons.appendChild(next);
    if (opts.peek) {
      var peekBtn = el("button", null, "𝐀");
      peekBtn.title = "Lees mee (read along)";
      buttons.appendChild(peekBtn);
    }
    box.appendChild(buttons);
    var slider = el("input");
    slider.type = "range"; slider.min = 0; slider.max = 1000; slider.value = 0;
    box.appendChild(slider);
    var peekBox = opts.peek ? el("div", "peek-box", "") : null;
    if (peekBox) box.appendChild(peekBox);
    var peeking = false, playing = false;

    function segAt(ms) {
      for (var i = segments.length - 1; i >= 0; i--) {
        if (ms >= segments[i].start_ms) return i;
      }
      return 0;
    }
    function setPlaying(p) { playing = p; toggle.textContent = p ? "⏸" : "▶"; }

    function activate() {           // this player takes over the audio element
      onTick = function (ms) {
        var frac = (ms - first) / (last - first);
        slider.value = Math.max(0, Math.min(1000, Math.round(frac * 1000)));
        var i = segAt(ms);
        if (opts.onSegment) opts.onSegment(i);
        if (peekBox) peekBox.textContent = peeking ? segments[i].nl : "";
      };
      onStop = function () { setPlaying(false); };
    }

    toggle.addEventListener("click", function () {
      activate();
      if (playing) { audio.pause(); setPlaying(false); return; }
      var pos = audio.currentTime * 1000;
      if (pos < first || pos >= last) playRange(first, last);
      else { stopAt = last; audio.play(); }
      setPlaying(true);
    });
    prev.addEventListener("click", function () {
      activate();
      var i = Math.max(0, segAt(audio.currentTime * 1000) - 1);
      playRange(segments[i].start_ms, last);
      setPlaying(true);
    });
    next.addEventListener("click", function () {
      activate();
      var i = Math.min(segments.length - 1, segAt(audio.currentTime * 1000) + 1);
      playRange(segments[i].start_ms, last);
      setPlaying(true);
    });
    slider.addEventListener("input", function () {
      activate();
      var ms = first + (slider.value / 1000) * (last - first);
      playRange(ms, last);
      setPlaying(true);
    });
    if (opts.peek) {
      peekBtn.addEventListener("click", function () {
        peeking = !peeking;
        peekBtn.classList.toggle("toggled", peeking);
        if (!peeking && peekBox) peekBox.textContent = "";
      });
    }
    return box;
  }

  // --- LEREN steps 1-4 ----------------------------------------------------------
  var HINTS = {
    1: "Luister per zin. Tik op de vertaling als je die nodig hebt. (Listen per sentence; tap to reveal the translation.)",
    2: "Luister naar het hele gesprek en lees mee. (Listen to the whole dialogue and read along.)",
    3: "Luister en spreek na in de pauze — zonder tekst. Tik 𝐀 om even mee te lezen. (Listen and repeat aloud in the pause — no text. Tap 𝐀 to peek.)",
    4: "Luister naar het hele gesprek — zonder tekst. (Listen to the whole dialogue — no text.)",
  };

  function lerenView(lesson, step) {
    var wrap = el("div");
    wrap.appendChild(el("p", "hint", HINTS[step]));
    var segB = lesson.segments.filter(function (s) { return s.block === "B"; });
    var segC = lesson.segments.filter(function (s) { return s.block === "C"; });

    if (step === 1) {
      // Vocabulary (block A, replays deduped) then the dialogue (block C): tap ▶
      // per sentence, translation veiled until tapped.
      var seen = {};
      lesson.segments.forEach(function (seg) {
        if (seg.block === "B") return;
        if (seg.block === "A" && seen[seg.nl]) return;
        seen[seg.nl] = true;
        var row = el("div", "line");
        var play = el("button", "play", "🔊");
        play.addEventListener("click", function () { playRange(seg.start_ms, seg.end_ms); });
        row.appendChild(play);
        row.appendChild(el("span", "nl", seg.nl));
        if (seg.en) {
          var en = el("span", "en veiled", seg.en);
          en.title = "vertaling (tap to reveal)";
          en.addEventListener("click", function () { en.classList.remove("veiled"); });
          row.appendChild(en);
        }
        wrap.appendChild(row);
      });
    } else if (step === 2 && segC.length) {
      var lines = [];
      var transcript = el("div", "transcript");
      segC.forEach(function (seg, i) {
        var row = el("div", "line");
        row.appendChild(el("span", "nl", (lesson.dialogue[i] ? lesson.dialogue[i].speaker + ": " : "") + seg.nl));
        if (seg.en) row.appendChild(el("span", "en", seg.en));
        lines.push(row); transcript.appendChild(row);
      });
      wrap.appendChild(makePlayer(segC, {
        onSegment: function (i) {
          lines.forEach(function (l, j) { l.classList.toggle("now", i === j); });
        },
      }));
      wrap.appendChild(transcript);
    } else if (step === 3 && segB.length) {
      // Block B has the repeat pauses baked into the audio: line -> pause -> line.
      wrap.appendChild(makePlayer(segB, { peek: true }));
    } else if (step === 4 && segC.length) {
      wrap.appendChild(makePlayer(segC, {}));
    } else {
      wrap.appendChild(el("p", "muted", "Geen audio voor deze stap."));
    }
    return wrap;
  }

  // --- LEREN step 5: Dictee -> Combineren -> Dictee (within-session repetition) --
  // Reuses step 1's block-A audio: the day's NEW words AND their example sentences,
  // each with its own span. You HEAR and TYPE (woorden, then zinnen), a matching
  // round breaks the echo, then you re-type with round-1 misses first. Only the WORD
  // rows of the FINAL round are scored, under kind "dicteren", saved as the bare word
  // form (w.id) so they norm-match report.words and ride the same wordMarks ->
  // bot deep-link -> next-day SRS as the exams. Sentences are practised and checked
  // but not sent (no word id to schedule). Article (de/het) and punctuation optional.
  function dicteeItems(lesson) {
    var segByNl = {};
    (lesson.segments || []).forEach(function (s) {
      if (s.block === "A" && !segByNl[s.nl]) segByNl[s.nl] = s;
    });
    var sentById = {};
    (lesson.sentences || []).forEach(function (s) {
      if (s.id && !sentById[s.id]) sentById[s.id] = s;
    });
    var words = [], sents = [];
    (lesson.new_words || []).forEach(function (w) {
      var wseg = segByNl[w.nl];
      if (wseg) words.push({ id: w.id, nl: w.nl, en: w.en || "", kind: "word",
                             start_ms: wseg.start_ms, end_ms: wseg.end_ms });
      var sent = sentById[w.id], sseg = sent && segByNl[sent.nl];
      if (sseg) sents.push({ id: w.id, nl: sent.nl, en: sent.en || "", kind: "sent",
                             start_ms: sseg.start_ms, end_ms: sseg.end_ms });
    });
    return { words: words, sents: sents };
  }
  // Tolerant compare: lowercase, drop punctuation, collapse spaces. Words also accept
  // the bare noun (leading de/het/een stripped) so gender is taught, not punished.
  function clean(s) {
    return s.toLowerCase().replace(/[.,!?;:'"]/g, "").trim().replace(/\s+/g, " ");
  }
  function stripArt(s) { return clean(s).replace(/^(de|het|een)\s+/, ""); }
  function dicteeOk(val, target, isWord) {
    var v = clean(val);
    if (!v) return false;
    if (v === clean(target)) return true;
    return isWord && stripArt(val) === stripArt(target);
  }
  function shuffle(a) {
    a = a.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  function dicteeView(lesson) {
    var data = dicteeItems(lesson), words = data.words, sents = data.sents;
    var wrap = el("div");
    if (!words.length && !sents.length) {
      wrap.appendChild(el("p", "muted",
        "Geen woorden om te dicteren vandaag. (No words to dictate today.)"));
      return wrap;
    }
    var steps = el("p", "subhint", "");
    var body = el("div", "dictee");
    wrap.appendChild(steps); wrap.appendChild(body);
    var firstMisses = [];   // nl's missed in round 1 -> surfaced first in round 2

    function order(list, round2) {
      if (!round2) return list.slice();
      var miss = list.filter(function (it) { return firstMisses.indexOf(it.nl) >= 0; });
      var keep = list.filter(function (it) { return firstMisses.indexOf(it.nl) < 0; });
      return miss.concat(keep);
    }

    function dictee(round) {
      steps.textContent = round === 1
        ? "Stap 5 · Dictee 1 van 2 — luister en typ (listen and type)"
        : "Stap 5 · Dictee 2 van 2 — nu uit je geheugen (now from memory)";
      body.textContent = "";
      body.appendChild(el("p", "hint",
        "Tik 🔊, typ wat je hoort, en kijk het na. Lidwoord (de/het) en leestekens "
        + "mogen weg. (Tap 🔊, type what you hear; article and punctuation optional.)"));
      var rows = [];
      var check = el("button", "score", "Nakijken");

      function addGroup(title, list) {
        if (!list.length) return;
        body.appendChild(el("p", "subhint", title));
        order(list, round === 2).forEach(function (it) {
          var row = el("div", "line");
          var play = el("button", "play", "🔊");
          play.addEventListener("click", function () { playRange(it.start_ms, it.end_ms); });
          var input = el("input");
          input.type = "text"; input.autocapitalize = "off"; input.autocomplete = "off";
          input.spellcheck = false;
          input.placeholder = it.kind === "word" ? "typ het woord" : "typ de zin";
          input.addEventListener("keydown", function (e) {
            if (e.key === "Enter" && !check.disabled) check.click();
          });
          var ans = el("span", "en", "");
          row.appendChild(play); row.appendChild(input); row.appendChild(ans);
          body.appendChild(row);
          rows.push({ it: it, input: input, ans: ans });
        });
      }
      addGroup("Woorden (words)", words);
      addGroup("Zinnen (sentences)", sents);

      var next = el("button", "score retake", round === 1 ? "→ Combineren" : "🔁 Opnieuw");
      next.style.display = "none";
      var result = el("span", "result", "");
      check.addEventListener("click", function () {
        var right = [], wrong = [], got = 0;
        if (round === 1) firstMisses = [];
        rows.forEach(function (r) {
          var isWord = r.it.kind === "word";
          var ok = dicteeOk(r.input.value, r.it.nl, isWord);
          r.input.disabled = true;
          r.input.classList.add(ok ? "right" : "wrong");
          r.ans.textContent = ok ? "✓ " + r.it.nl
                                 : r.it.nl + (isWord ? " — " + r.it.en : "");
          if (ok) got++;
          if (isWord) (ok ? right : wrong).push(r.it.id);   // only words feed the SRS
          if (!ok && round === 1) firstMisses.push(r.it.nl);
        });
        result.textContent = got + "/" + rows.length + " goed";
        check.disabled = true; next.style.display = "";
        if (round === 2 && (right.length || wrong.length))
          saveResult(lesson.date, "dicteren", right, wrong);
      });
      next.addEventListener("click", function () {
        if (round === 1) { words.length >= 2 ? combineren() : dictee(2); }
        else { firstMisses = []; dictee(1); }
      });
      var bar = el("p");
      bar.appendChild(check); bar.appendChild(next); bar.appendChild(result);
      body.appendChild(bar);
      if (rows.length) {
        rows[0].input.focus();
        playRange(rows[0].it.start_ms, rows[0].it.end_ms);
      }
    }

    function combineren() {
      steps.textContent =
        "Stap 5 · Combineren — koppel woord en betekenis (match word and meaning)";
      body.textContent = "";
      body.appendChild(el("p", "hint",
        "Tik een woord en dan de juiste betekenis. (Tap a word, then its meaning.)"));
      var grid = el("div", "match-grid");
      var leftCol = el("div", "match-col"), rightCol = el("div", "match-col");
      grid.appendChild(leftCol); grid.appendChild(rightCol);
      body.appendChild(grid);
      var next = el("button", "score", "→ Dictee 2");
      next.disabled = true;
      var sel = null, done = 0;
      shuffle(words).forEach(function (it) {
        var b = el("button", "chip", it.nl);
        b.addEventListener("click", function () {
          if (b.classList.contains("done")) return;
          if (sel) sel.btn.classList.remove("sel");
          sel = { it: it, btn: b }; b.classList.add("sel");
        });
        leftCol.appendChild(b);
      });
      shuffle(words).forEach(function (it) {
        var b = el("button", "chip", it.en);
        b.addEventListener("click", function () {
          if (b.classList.contains("done") || !sel) return;
          if (sel.it.id === it.id) {
            sel.btn.classList.remove("sel");
            sel.btn.classList.add("done"); sel.btn.disabled = true;
            b.classList.add("done"); b.disabled = true;
            sel = null;
            if (++done === words.length) next.disabled = false;
          } else {
            b.classList.add("miss");
            setTimeout(function () { b.classList.remove("miss"); }, 350);
          }
        });
        rightCol.appendChild(b);
      });
      next.addEventListener("click", function () { dictee(2); });
      var bar = el("p"); bar.appendChild(next); body.appendChild(bar);
    }

    dictee(1);
    return wrap;
  }

  // --- TEST: gatentekst ----------------------------------------------------------
  function buildClozeLine(text, inputs, numberOffset) {
    var div = el("div", "cloze-line");
    var parts = text.split(/___ \((\d+)\)/g);   // text, n, text, n, ...
    for (var i = 0; i < parts.length; i++) {
      if (i % 2 === 0) { div.appendChild(document.createTextNode(parts[i])); continue; }
      var input = el("input");
      input.dataset.n = (numberOffset || 0) + parseInt(parts[i], 10);
      input.autocapitalize = "none";
      inputs.push(input);
      div.appendChild(input);
    }
    return div;
  }

  function checkInputs(inputs, answersByN) {
    var right = [], wrong = [];
    inputs.forEach(function (input) {
      var want = answersByN[input.dataset.n] || "";
      var ok = norm(input.value) === norm(want);
      input.classList.toggle("right", ok);
      input.classList.toggle("wrong", !ok);
      if (ok) { input.disabled = true; right.push(want); } else { wrong.push(want); }
    });
    return { right: right, wrong: wrong };
  }

  function gatentekstView(lesson) {
    var wrap = el("div");
    wrap.appendChild(el("p", "hint", "Vul de juiste woorden in — eerst uit je geheugen. (Fill in the correct words from memory first.)"));
    if (!lesson.cloze || !lesson.cloze.answers.length) {
      wrap.appendChild(el("p", "muted", "Geen invuloefening vandaag."));
      return wrap;
    }
    var inputs = [], answersByN = {};
    lesson.cloze.answers.forEach(function (a, i) { answersByN[i + 1] = a; });
    lesson.cloze.lines.forEach(function (line) {
      wrap.appendChild(buildClozeLine(line, inputs, 0));
    });
    wrap.appendChild(examControls(
      lesson, "gatentekst", lesson.cloze.answers.length, inputs, answersByN
    ));
    return wrap;
  }

  // --- TEST: luistertoets (hear each sentence ONCE, then fill its words) ---------
  function luistertoetsView(lesson) {
    var wrap = el("div");
    wrap.appendChild(el("p", "hint",
      "Luister één keer per zin — daarna is de knop weg — en vul de woorden in. (One listen per sentence — then the button is gone — and fill in the words.)"));
    var segC = lesson.segments.filter(function (s) { return s.block === "C"; });
    var items = lesson.luistertoets || [];
    if (!items.length || !segC.length) {
      wrap.appendChild(el("p", "muted", "Geen luistertoets vandaag."));
      return wrap;
    }
    var inputs = [], answersByN = {}, n = 0, totalBlanks = 0;
    var plays = [], keys = [];
    items.forEach(function (item, i) {
      var row = el("div", "lt-row");
      var play = el("button", "play", "🔊");
      var key = "learnx-dutch-lt-" + lesson.date + "-" + i;
      plays.push(play); keys.push(key);
      if (localStorage.getItem(key)) { play.disabled = true; play.textContent = "✓"; }
      play.style.marginRight = ".6rem";
      play.addEventListener("click", function () {
        localStorage.setItem(key, "1");
        play.disabled = true; play.textContent = "✓";
        if (segC[i]) playRange(segC[i].start_ms, segC[i].end_ms);
      });
      row.appendChild(play);
      row.appendChild(el("span", "speaker", item.speaker + ":"));
      // Renumber this line's blanks into the global answer map so one Score
      // button can check everything.
      var offset = n;
      item.answers.forEach(function (a) { n += 1; answersByN[n] = a; totalBlanks += 1; });
      var text = item.nl.replace(/___ \((\d+)\)/g, function (m, d) {
        return "___ (" + (offset + parseInt(d, 10)) + ")";
      });
      var line = buildClozeLine(text, inputs, 0);
      line.style.display = "inline";
      row.appendChild(line);
      wrap.appendChild(row);
    });
    wrap.appendChild(examControls(
      lesson, "luistertoets", totalBlanks, inputs, answersByN,
      function () {   // a retake grants fresh one-chance listens
        keys.forEach(function (k) { localStorage.removeItem(k); });
        plays.forEach(function (p) { p.disabled = false; p.textContent = "🔊"; });
      }
    ));
    return wrap;
  }

  // --- LESSEN: per-day final scores + the lesson archive (a finished lesson
  // stays visitable — tap ▶ to reopen that day) -----------------------------------
  function lessenView(lesson) {
    var wrap = el("div");
    // Scores sync on page load (loadProgress in the init chain), so a reload is all it
    // takes to pull the day's update — no refresh button needed.
    wrap.appendChild(el("p", "hint",
      "Jouw lessen en eindscores. Tik ▶ om een eerdere les te openen. "
      + "(Your lessons and final scores. Tap ▶ to reopen a past lesson.)"));
    if (progress.streak || progress.cefr || progress.words) {
      wrap.appendChild(el("p", "synced",
        "Gesynchroniseerd: " + progress.words + " woorden · reeks " + progress.streak
        + (progress.cefr ? " · " + progress.cefr : "")));
    }
    var all = loadResults();
    var byDate = {};                                  // archive manifest, keyed by date
    manifest.forEach(function (m) { if (m.date) byDate[m.date] = m; });
    var dates = Object.keys(all);
    // Fold in days that only exist server-side (submitted on another device) and any
    // archived day, so the list is the full history, not just this browser's.
    Object.keys(progress.days).forEach(function (d) {
      if (dates.indexOf(d) === -1) dates.push(d);
    });
    Object.keys(byDate).forEach(function (d) {
      if (dates.indexOf(d) === -1) dates.push(d);
    });
    if (lesson.date && dates.indexOf(lesson.date) === -1) dates.push(lesson.date);
    dates.sort().reverse();
    if (!dates.length) {
      wrap.appendChild(el("p", "muted", "Nog geen lessen gedaan."));
      return wrap;
    }
    dates.forEach(function (d) {
      var row = el("div", "les-row");
      if (d === lesson.date) row.classList.add("open");
      if (d !== lesson.date && byDate[d]) {           // reopen any archived day
        var open = el("button", "play", "▶");
        open.title = "Open deze les (reopen this lesson)";
        open.addEventListener("click", function () { openLesson(d); });
        row.appendChild(open);
      }
      row.appendChild(el("span", "les", "LES " + d.slice(5)));   // MM-DD as the lesson id
      var theme = d === lesson.date ? lesson.theme : (byDate[d] || {}).theme || "";
      row.appendChild(el("span", "title",
        d === lesson.date ? theme + (d === latestDate ? " · vandaag" : " · geopend")
                          : theme));
      var right = 0, total = 0, kinds = all[d] || {};
      Object.keys(kinds).forEach(function (k) {
        right += (kinds[k].right || []).length;
        total += (kinds[k].right || []).length + (kinds[k].wrong || []).length;
      });
      var synced = false;
      if (!total && progress.days[d]) {        // no local result -> use the synced score
        right = progress.days[d].right || 0;
        total = right + (progress.days[d].wrong || 0);
        synced = total > 0;
      }
      var meta = el("span", "meta");
      var used = Math.max(attemptsUsed(d, "gatentekst"), attemptsUsed(d, "luistertoets"));
      if (used) {
        meta.appendChild(el("span", "attempts",
          used >= MAX_ATTEMPTS ? "klaar" : "poging " + used + "/" + MAX_ATTEMPTS));
      }
      if (total) {
        meta.appendChild(el("span", "pct", Math.round(100 * right / total) + "%"));
        meta.appendChild(el("span", "check", synced ? "☁" : "✔")).title =
          synced ? "Gesynchroniseerd van een ander apparaat (synced from another device)"
                 : "Op dit apparaat (on this device)";
      } else {
        meta.appendChild(el("span", "pct muted", "—"));
      }
      row.appendChild(meta);
      wrap.appendChild(row);
    });
    return wrap;
  }

  // --- HERHALING (multi-user Phase 1): a learner's personal cross-day review ------
  // Active only when the page is opened with ?u=<token> (the trainer link the daily
  // DM builds per learner). review/<token>.json is the canonical "what's due"; this
  // localStorage cache only remembers today's attempts so a reload doesn't lose them.
  var reviewToken = new URLSearchParams(location.search).get("u");
  var reviewData = null;
  var rAudio = new Audio(); rAudio.preload = "metadata"; var rStop = null;
  // Separate watchdog: review snippets play from each word's OWN day audio (a
  // different MP3 than today's lesson blob), so they ride a second audio element.
  setInterval(function () {
    if (rAudio.paused) return;
    if (rStop !== null && rAudio.currentTime * 1000 >= rStop - 20) {
      rAudio.pause(); rStop = null;
    }
  }, 40);
  function playSpan(url, startMs, endMs) {
    audio.pause();                       // hand off from the main lesson player
    if (rAudio.src !== url) rAudio.src = url;   // cross-origin OK: media load needs no CORS
    var go = function () { rAudio.currentTime = (startMs + 10) / 1000; rAudio.play(); };
    rStop = endMs;
    if (rAudio.readyState >= 1) { go(); return; }
    rAudio.addEventListener("loadedmetadata", go, { once: true });
    rAudio.load();
  }
  function escapeRe(str) { return str.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }

  var RSTORE = "learnx-dutch-review";
  function loadReviewMarks(date) {
    try { return (JSON.parse(localStorage.getItem(RSTORE)) || {})[date] || {}; }
    catch (e) { return {}; }
  }
  function saveReviewMark(date, id, ok) {
    var all;
    try { all = JSON.parse(localStorage.getItem(RSTORE)) || {}; } catch (e) { all = {}; }
    all[date] = all[date] || {};
    all[date][id] = ok ? 1 : 0;
    localStorage.setItem(RSTORE, JSON.stringify(all));
  }
  // rv_<YYMMDD>_<marks>: one mark per review item in reviewData.ids order (the run
  // stored that order, so positions map back to ids) - 1 right / 0 wrong / x untried.
  function drawReviewReport(box) {
    if (!box) return;
    box.textContent = "";
    var bot = currentLesson && currentLesson.report && currentLesson.report.bot;
    if (!bot || !reviewData) return;
    var m = loadReviewMarks(reviewData.generated);
    var marks = reviewData.ids.map(function (id) {
      return (id in m) ? (m[id] ? "1" : "0") : "x";
    }).join("");
    if (!/[01]/.test(marks)) return;     // nothing scored yet
    var a = el("a", "score", "✅ Herhaling opslaan");
    a.href = "https://t.me/" + bot + "?start=rv_" +
             reviewData.generated.replace(/-/g, "").slice(2) + "_" + marks;
    box.appendChild(a);
    box.appendChild(el("span", "report-note",
      "stuurt je herhaling naar de bot (sends your review to the bot)"));
  }

  function herhalingView() {
    var wrap = el("div");
    if (!reviewData || !(reviewData.items || []).length) {
      wrap.appendChild(el("p", "muted",
        "Geen herhaling vandaag - je bent bij! (Nothing due today - you're caught up.)"));
      return wrap;
    }
    wrap.appendChild(el("p", "hint",
      "Jouw woorden die vandaag herhaald moeten worden - vul in uit je geheugen. " +
      "(Your words due for review today - fill them in from memory.)"));
    var marks = loadReviewMarks(reviewData.generated);
    var inputs = [];
    reviewData.items.forEach(function (item) {
      var row = el("div", "cloze-line");
      if (item.audio_url && item.end_ms) {
        var play = el("button", "play", "🔊");
        play.style.marginRight = ".6rem";
        play.addEventListener("click", function () {
          playSpan(item.audio_url, item.start_ms || 0, item.end_ms);
        });
        row.appendChild(play);
      }
      var input = el("input");
      input.autocapitalize = "none";
      input.dataset.id = item.id;
      input.dataset.form = item.form;
      inputs.push(input);
      if (item.sentence_nl) {                 // blank the word out of its own sentence
        var parts = item.sentence_nl.split(new RegExp(escapeRe(item.form), "i"));
        row.appendChild(document.createTextNode(parts[0] || ""));
        row.appendChild(input);
        row.appendChild(document.createTextNode(parts.slice(1).join(item.form) || ""));
        if (item.sentence_en) {
          var en = el("span", "en", " - " + item.sentence_en);
          en.style.marginLeft = ".4rem";
          row.appendChild(en);
        }
      } else {                                // gloss-only recall (no archived sentence)
        row.appendChild(el("span", null, "„" + (item.en || "") + "” = "));
        row.appendChild(input);
      }
      if (item.id in marks) {                 // restore today's cached attempt
        if (marks[item.id]) { input.value = item.form; input.classList.add("right"); input.disabled = true; }
        else { input.classList.add("wrong"); }
      }
      wrap.appendChild(row);
    });
    var bar = el("p");
    var score = el("button", "score", "Score");
    var result = el("span", "result", "");
    var rb = el("p");
    score.addEventListener("click", function () {
      var right = 0;
      inputs.forEach(function (i) {
        var ok = norm(i.value) === norm(i.dataset.form);
        i.classList.toggle("right", ok);
        i.classList.toggle("wrong", !ok);
        saveReviewMark(reviewData.generated, i.dataset.id, ok);
        if (ok) { i.disabled = true; right += 1; }
      });
      result.textContent = right + "/" + inputs.length + " goed";
      drawReviewReport(rb);
    });
    bar.appendChild(score); bar.appendChild(result);
    wrap.appendChild(bar);
    wrap.appendChild(rb);
    drawReviewReport(rb);
    return wrap;
  }

  function loadReview() {
    if (!reviewToken) return;
    fetch("review/" + reviewToken + ".json?v=" + Date.now(), { cache: "no-store" })
      .then(function (r) { return r.ok ? r.json() : null; })
      .catch(function () { return null; })
      .then(function (data) {
        if (!data || !(data.items || []).length) return;
        reviewData = data;
        var tab = document.getElementById("tab-herhaling");
        if (tab) tab.style.display = "";
      });
  }

  // --- page assembly --------------------------------------------------------------
  var manifest = [];     // lessons/index.json entries — the archived days (oldest first)
  var latestDate = "";   // dutch_lesson.json's date — the day with a same-origin MP3 copy
  var currentLesson = null;
  // Cross-device scorecard published by the daily run (progress/<token>.json). The
  // LESSEN scores below come from localStorage (this browser only), so results
  // submitted on the phone never show on the computer. This is the server-side record,
  // keyed by date, used as the fallback whenever a day has no local result. It's
  // token-gated (same ?u=<token> as the review tab) so a learner only ever fetches
  // their OWN scores — opened without a token, the page falls back to localStorage.
  var progress = { days: {}, streak: 0, cefr: "", words: 0 };
  function loadProgress() {
    if (!reviewToken) return Promise.resolve();
    return fetch("progress/" + reviewToken + ".json?v=" + Date.now(), { cache: "no-store" })
      .then(function (r) { return r.ok ? r.json() : null; })
      .catch(function () { return null; })
      .then(function (p) {
        if (!p) return;
        progress = { days: {}, streak: p.streak || 0, cefr: p.cefr || "",
                     words: p.words_tracked || 0 };
        (p.days || []).forEach(function (d) { if (d.date) progress.days[d.date] = d; });
      });
  }
  var state = { tab: "leren", step: 1, sub: "gatentekst" };

  // Load the lesson MP3 fully as a blob: blob URLs are instantly and exactly
  // seekable, independent of server Range support (python -m http.server has none
  // — seeks clamped to 0, the "plays from the beginning" bug). The Pages deploy
  // puts a same-origin copy at dutch_audio.mp3 for the LATEST lesson only (the
  // release CDN sends no CORS header, so the browser cannot fetch it cross-origin);
  // local previews fall through to the lesson's own audio_url, which is then
  // same-origin too. Archived days skip the copy and end at the direct CDN URL —
  // the release CDN honours Range requests, so seeking still works there.
  function loadAudio(lesson) {
    var fromUrl = function () {
      return fetch(lesson.audio_url)
        .then(function (r) { if (!r.ok) throw 0; return r.blob(); });
    };
    (lesson.date === latestDate
      // ?v=<date> busts the CDN edge per day (same filename, new content daily)
      // without re-downloading the multi-MB blob on every load within a day.
      ? fetch("dutch_audio.mp3?v=" + latestDate)
          .then(function (r) { if (!r.ok) throw 0; return r.blob(); })
          .catch(fromUrl)
      : fromUrl())
      .then(function (b) { audio.src = URL.createObjectURL(b); })
      .catch(function () { audio.src = lesson.audio_url; }); // last resort: direct
  }

  function setTab(t) {
    state.tab = t;
    document.querySelectorAll("#tabs button").forEach(function (x) {
      x.classList.toggle("active", x.dataset.tab === t);
    });
  }

  // Reopen an archived day from the lessen list: fetch its dated JSON and render
  // it as the current lesson (leren step 1, like a fresh open).
  function openLesson(d) {
    fetch("lessons/dutch-" + d + ".json?v=" + Date.now(), { cache: "no-store" })
      .then(function (r) { if (!r.ok) throw 0; return r.json(); })
      .then(render)
      .catch(function () {
        document.getElementById("meta").textContent = "les " + d + " niet gevonden";
      });
  }

  function draw() {
    var lesson = currentLesson;
    app.textContent = "";
    var pills = el("div", "pills");
    if (state.tab === "leren") {
      [1, 2, 3, 4, 5].forEach(function (s) {
        var b = el("button", s === state.step ? "active" : "", String(s));
        b.addEventListener("click", function () { state.step = s; draw(); });
        pills.appendChild(b);
      });
      app.appendChild(pills);
      app.appendChild(state.step === 5
        ? dicteeView(lesson) : lerenView(lesson, state.step));
    } else if (state.tab === "lessen") {
      app.appendChild(lessenView(lesson));
    } else if (state.tab === "herhaling") {
      app.appendChild(herhalingView());
      return;   // the review tab manages its own report; skip the lesson report/stats
    } else {
      ["gatentekst", "luistertoets"].forEach(function (k) {
        var b = el("button", k === state.sub ? "active" : "", k);
        b.addEventListener("click", function () { state.sub = k; draw(); });
        pills.appendChild(b);
      });
      app.appendChild(pills);
      app.appendChild(state.sub === "gatentekst"
        ? gatentekstView(lesson) : luistertoetsView(lesson));
    }
    reportBox = el("p");
    app.appendChild(reportBox);
    statsBox = el("p", "stats");
    app.appendChild(statsBox);
    refreshStats();
  }

  document.querySelectorAll("#tabs button").forEach(function (b) {
    b.addEventListener("click", function () {
      audio.pause(); rAudio.pause(); rStop = null; stopAt = null; onTick = null; onStop = null;
      setTab(b.dataset.tab);
      draw();
    });
  });

  function render(lesson) {
    audio.pause(); stopAt = null; onTick = null; onStop = null;
    currentLesson = lesson;
    document.getElementById("meta").textContent =
      lesson.date + " · " + lesson.theme + " · " + lesson.cefr;
    loadAudio(lesson);
    reportLesson = lesson;
    document.getElementById("tabs").style.display = "";
    setTab("leren");
    state.step = 1;
    draw();
  }

  // The archive manifest first (missing on day one — fine, the list just shows
  // on-device results only), then today's lesson.
  // Cache-bust the JSON fetches: cache:"no-store" stops the browser cache, but
  // GitHub Pages' CDN edge serves these with max-age=600, so a phone on a
  // different edge can keep showing yesterday's lesson for ~10min after a deploy.
  // A unique query string forces an edge cache MISS -> fresh fetch from origin.
  fetch("lessons/index.json?v=" + Date.now(), { cache: "no-store" })
    .then(function (r) { return r.ok ? r.json() : {}; })
    .catch(function () { return {}; })
    .then(function (idx) {
      manifest = (idx && idx.lessons) || [];
      return fetch("dutch_lesson.json?v=" + Date.now(), { cache: "no-store" });
    })
    .then(function (resp) {
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      return resp.json();
    })
    .then(function (lesson) {
      latestDate = lesson.date || "";
      render(lesson);
      loadReview();
      loadProgress().then(function () { if (state.tab === "lessen") draw(); });
    })
    .catch(function () {
      document.getElementById("meta").textContent = "geen les";
      app.textContent = "";
      app.appendChild(el("p", "muted",
        "No lesson yet — the first one appears after the next daily run."));
    });
})();
</script>
</body></html>
