name: Skill-alias curation

# Weekly autonomous pass: embeddings shortlist near-duplicate skill names, the NIM
# LLM judges which are truly the same skill, accepted merges are committed back so
# the daily radar collapses them (see radar/alias_curator.py). Runs here rather than
# a Claude cloud routine because this environment already has the NIM + Telegram
# secrets and write access. Weeks with nothing new commit nothing.
on:
  schedule:
    - cron: "0 8 * * 1"   # Mondays 08:00 UTC, after the daily radar has accrued history
  workflow_dispatch:        # allow manual runs from the Actions tab

permissions:
  contents: write           # commit learned aliases back to main

jobs:
  curate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # Learned aliases + their audit log live in the private state repo.
      - name: Check out private state repo
        uses: actions/checkout@v4
        with:
          repository: Yusuprozimemet/LearnX-Radar-state
          token: ${{ secrets.STATE_REPO_TOKEN }}
          path: state

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Curate skill aliases
        env:
          STATE_DIR: ${{ github.workspace }}/state
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m scripts.curate_aliases

      - name: Commit learned aliases to private repo
        working-directory: state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skill_aliases.json skill_aliases_log.md
          git diff --staged --quiet || git commit -m "chore(radar): learn skill aliases"
          git push