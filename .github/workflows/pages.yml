name: Deploy dashboard to Pages

# Decoupled from the cron: rebuilds the dashboard from committed state
# (skill_memory.json + last_scored.json) — no API keys needed. Publishes after
# each radar run (workflow_run), on manual dispatch, and when state/dashboard
# code changes land on main.
on:
  workflow_run:
    workflows: ["LearnX-Radar"]
    types: [completed]
  workflow_dispatch:
  push:
    branches: [main]
    # State now lives in the private repo, so rebuilds after a radar run come via
    # the workflow_run trigger above; here we only rebuild on dashboard code changes.
    paths:
      - "dashboard/**"

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      # Read-only checkout of the private state repo: the dashboard + podcast feed
      # render from it (skill_memory / last_scored / dutch_memory / lessons). STATE_DIR
      # points the build at it; nothing here is committed back.
      - name: Check out private state repo
        uses: actions/checkout@v7
        with:
          repository: Yusuprozimemet/LearnX-Radar-state
          token: ${{ secrets.STATE_REPO_TOKEN }}
          path: state
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build dashboard + podcast feed from committed state
        env:
          STATE_DIR: ${{ github.workspace }}/state
        run: |
          python -m dashboard
          mkdir -p _site
          cp dashboard/index.html _site/index.html
          cp dashboard/podcast.xml _site/podcast.xml
          cp dashboard/privacy.html _site/privacy.html
          cp dashboard/dutch.html _site/dutch.html         # Delft trainer page (v9)
          cp dashboard/favicon.svg _site/favicon.svg       # browser-tab icon (all pages)
          cp state/dutch_lesson.json _site/dutch_lesson.json 2>/dev/null || true  # today's lesson for the trainer
          # Cross-device progress scorecard (dutch/progress.py): the trainer's LESSEN
          # scores live in localStorage (per-browser), so a phone result never shows on
          # the computer. This server-side record, refreshed each run, lets every device
          # show the full per-day history. Token-gated (progress/<token>.json, fetched
          # via ?u=<token>) so a learner only sees their OWN scores — never a global
          # file readable by anyone. Absent on day one — the copy is simply skipped.
          if [ -d state/progress ]; then mkdir -p _site/progress && cp state/progress/*.json _site/progress/; fi
          # Lesson archive (dated JSONs + index.json): the trainer's lesson list.
          # Past days play their audio straight from the release CDN (it supports
          # Range requests, so seeking works without the same-origin blob copy).
          if [ -d state/lessons ]; then mkdir -p _site/lessons && cp state/lessons/*.json _site/lessons/; fi
          # Per-user review lists (multi-user Phase 1): the trainer page fetches
          # review/<token>.json when opened with ?u=<token>. Absent on a single-user
          # deployment - the copy is skipped and the herhaling tab simply never shows.
          if [ -d state/review ]; then mkdir -p _site/review && cp state/review/*.json _site/review/; fi
          # Same-origin copy of the lesson MP3: the release CDN sends no CORS header,
          # so the trainer page can't fetch it cross-origin (it needs blob-loading for
          # exact sentence seeking). Downloading here is server-side — no CORS involved.
          if [ -f state/dutch_lesson.json ]; then
            url=$(python -c "import json;print(json.load(open('state/dutch_lesson.json'))['audio_url'])")
            curl -sL --fail -o _site/dutch_audio.mp3 "$url" || echo "dutch audio not fetched (non-fatal)"
          fi
          cp image.png _site/og.png            # social-share preview (og:image)
          cp dashboard/cover.png _site/cover.png   # podcast artwork (itunes:image)
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v5
