name: Deploy dashboard to Pages

# Decoupled from the cron: rebuilds the dashboard from committed state
# (skill_memory.json + last_scored.json) — no API keys needed. Publishes after
# each radar run (workflow_run), on manual dispatch, and when state/dashboard
# code changes land on main.
on:
  workflow_run:
    workflows: ["LearnX-Radar"]
    types: [completed]
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "storage/skill_memory.json"
      - "storage/last_scored.json"
      - "storage/trending_history.json"
      - "storage/dutch_lesson.json"
      - "storage/lessons/**"
      - "dashboard/**"

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build dashboard + podcast feed from committed state
        run: |
          python -m dashboard
          mkdir -p _site
          cp dashboard/index.html _site/index.html
          cp dashboard/podcast.xml _site/podcast.xml
          cp dashboard/privacy.html _site/privacy.html
          cp dashboard/dutch.html _site/dutch.html         # Delft trainer page (v9)
          cp storage/dutch_lesson.json _site/dutch_lesson.json 2>/dev/null || true  # today's lesson for the trainer
          # Lesson archive (dated JSONs + index.json): the trainer's lesson list.
          # Past days play their audio straight from the release CDN (it supports
          # Range requests, so seeking works without the same-origin blob copy).
          if [ -d storage/lessons ]; then mkdir -p _site/lessons && cp storage/lessons/*.json _site/lessons/; fi
          # Same-origin copy of the lesson MP3: the release CDN sends no CORS header,
          # so the trainer page can't fetch it cross-origin (it needs blob-loading for
          # exact sentence seeking). Downloading here is server-side — no CORS involved.
          if [ -f storage/dutch_lesson.json ]; then
            url=$(python -c "import json;print(json.load(open('storage/dutch_lesson.json'))['audio_url'])")
            curl -sL --fail -o _site/dutch_audio.mp3 "$url" || echo "dutch audio not fetched (non-fatal)"
          fi
          cp image.png _site/og.png            # social-share preview (og:image)
          cp dashboard/cover.png _site/cover.png   # podcast artwork (itunes:image)
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
