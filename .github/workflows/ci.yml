name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install system dependencies
        # The runner image ships Microsoft apt repos (azure-cli, prod) that this
        # job never uses; when packages.microsoft.com intermittently 403s, they
        # turn apt-get update into exit 100 — drop them before updating.
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli* /etc/apt/sources.list.d/microsoft-prod*
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev pkg-config
      - run: pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q
