name: LearnX-Radar

on:
  schedule:
    - cron: "0 6 * * *"  # 06:00 UTC, every day
  workflow_dispatch:        # allow manual runs from the Actions tab

permissions:
  contents: write           # needed to commit seen_skills.json / skill_memory.json back

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ffmpeg (edge-tts assembly)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libcairo2-dev pkg-config

      - run: pip install -r requirements.txt

      - name: Run radar
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_BOT_USERNAME: ${{ secrets.TELEGRAM_BOT_USERNAME }}  # v9 day 33: Save-results deep link
          TELEGRAM_CHANNEL_BOT_TOKEN: ${{ secrets.TELEGRAM_CHANNEL_BOT_TOKEN }}
          WAITLIST_URL: ${{ secrets.WAITLIST_URL }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python main.py

      - name: Publish lesson audio to Releases
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          files=(output/lesson-*.mp3 output/dutch-*.mp3)   # dev + Dutch (v5) lessons
          if [ ${#files[@]} -eq 0 ]; then echo "no audio produced today — nothing to publish"; exit 0; fi
          gh release view lessons >/dev/null 2>&1 || \
            gh release create lessons -t "LearnX-Radar lessons" -n "Daily lesson audio (podcast feed enclosures)."
          gh release upload lessons "${files[@]}" --clobber

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add storage/seen_skills.json storage/skill_memory.json storage/last_scored.json storage/trending_history.json briefs/
          git add storage/dutch_memory.json 2>/dev/null || true   # v5: present once Dutch has run
          git add storage/dutch_lesson.json 2>/dev/null || true   # v9: Delft trainer lesson JSON
          git diff --staged --quiet || git commit -m "chore: update radar state [skip ci]"
          git push
