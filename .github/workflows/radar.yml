name: LearnX-Radar

on:
  schedule:
    - cron: "0 6 * * *"  # 06:00 UTC, every day
  workflow_dispatch:        # allow manual runs from the Actions tab

permissions:
  contents: write           # needed to commit seen_skills.json / skill_memory.json back

# Serialize radar runs (a manual dispatch overlapping the 06:00 cron) so two runs
# can't race on the state-repo push and hit a non-fast-forward. Don't cancel an
# in-flight run — it may be mid-delivery; queue the new one behind it instead.
concurrency:
  group: radar-run
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    # Hard cap so a hung LLM endpoint can't keep the cron running for hours
    # (each NIM call can stall ~120s x retries). GitHub cancels the job at this
    # limit and marks it failed; the next scheduled run starts clean.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      # Personal state (Dutch SR memory, radar JSON, lesson archive) lives in a
      # private repo so it never appears in this public repo's files or history.
      # STATE_DIR (read by storage/state.py) points the app at this checkout.
      - name: Check out private state repo
        uses: actions/checkout@v4
        with:
          repository: Yusuprozimemet/LearnX-Radar-state
          token: ${{ secrets.STATE_REPO_TOKEN }}
          path: state

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ffmpeg (edge-tts assembly)
        # The runner image ships Microsoft apt repos (azure-cli, prod) that this
        # job never uses; when packages.microsoft.com intermittently 403s, they
        # turn apt-get update into exit 100 — drop them before updating.
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli* /etc/apt/sources.list.d/microsoft-prod*
          sudo apt-get update
          sudo apt-get install -y ffmpeg libcairo2-dev pkg-config

      - run: pip install -r requirements.txt

      - name: Run radar
        env:
          STATE_DIR: ${{ github.workspace }}/state   # read/write personal state in the private checkout
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_BOT_USERNAME: ${{ secrets.TELEGRAM_BOT_USERNAME }}  # v9 day 33: Save-results deep link
          ALLOWED_CHAT_IDS: ${{ secrets.ALLOWED_CHAT_IDS }}        # multi-user Dutch (Phase 1); empty -> single-user
          REVIEW_TOKEN_SECRET: ${{ secrets.REVIEW_TOKEN_SECRET }}  # names per-user review/<token>.json
          TELEGRAM_CHANNEL_BOT_TOKEN: ${{ secrets.TELEGRAM_CHANNEL_BOT_TOKEN }}
          WAITLIST_URL: ${{ secrets.WAITLIST_URL }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python main.py

      - name: Publish lesson audio to Releases
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          files=(output/lesson-*.mp3 output/dutch-*.mp3)   # dev + Dutch (v5) lessons
          if [ ${#files[@]} -eq 0 ]; then echo "no audio produced today — nothing to publish"; exit 0; fi
          gh release view lessons >/dev/null 2>&1 || \
            gh release create lessons -t "LearnX-Radar lessons" -n "Daily lesson audio (podcast feed enclosures)."
          gh release upload lessons "${files[@]}" --clobber

      - name: Commit briefs to public repo
        # briefs/ stays public — lessons link to them by raw URL for Perplexity Q&A.
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add briefs/
          git diff --staged --quiet || git commit -m "chore: update briefs [skip ci]"
          git push

      - name: Commit state to private repo
        # always(): run even when "Run radar" failed or timed out. _ingest_inbound
        # folds inbound Telegram feedback (recall reports, lesson ratings) to disk
        # FIRST and drops it from Telegram's queue — so if a later LLM crash skipped
        # this step, that feedback would be lost on the ephemeral runner. Committing
        # regardless guarantees already-folded results are persisted no matter how
        # the run ended. All personal state (Dutch SR memory, radar JSON, lesson
        # archive) is pushed to the private repo, never the public one.
        if: always()
        working-directory: state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && exit 0
          git commit -m "chore: update radar state"
          # The weekly curate workflow pushes to this same repo; rebase onto any
          # commit it landed since our checkout so the push is a clean fast-forward.
          git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)"
          git push
